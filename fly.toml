# fly.toml app configuration file generated for billgenie-api on 2026-06-18T22:18:32+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'billgenie-api'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile'

[env]
  ENABLE_LOGGING = 'true'
  ENABLE_WEBSOCKET = 'true'
  LOG_LEVEL = 'info'
  PORT = '3000'
  SERVER_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
